<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chatbot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url("https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1974&auto=format&fit=crop")
center/cover no-repeat fixed;

}

.chat-container{

width:430px;
height:720px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.2);

border-radius:25px;

overflow:hidden;

box-shadow:0 20px 50px rgba(0,0,0,.4);

display:flex;

flex-direction:column;

}

.header{

background:rgba(255,255,255,.08);

padding:18px;

display:flex;

align-items:center;

justify-content:center;

gap:10px;

color:#fff;

font-size:24px;

font-weight:bold;

}

.online{

width:10px;
height:10px;
background:#00ff7f;
border-radius:50%;
box-shadow:0 0 10px #00ff7f;

}
.chat-container{
    width:430px;
    height:700px;
    max-width:95%;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border-radius:24px;
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 20px 50px rgba(0,0,0,.35);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.chat-box{
    flex:1;
    padding:18px;
    overflow-y:auto;
    overflow-x:hidden;   /* Prevent horizontal scrolling */
    display:flex;
    flex-direction:column;
    gap:14px;
}

.message{
    max-width:82%;
    width:fit-content;
    padding:12px 16px;
    border-radius:18px;
    line-height:1.6;
    font-size:15px;

    /* Fix long AI responses */
    white-space:pre-wrap;
    word-wrap:break-word;
    overflow-wrap:anywhere;
    word-break:break-word;

    animation:show .3s ease;
}

.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#00c853,#00e676);
    color:#fff;
    border-bottom-right-radius:6px;
}

.bot{
    align-self:flex-start;
    background:#ffffff;
    color:#222;
    border-bottom-left-radius:6px;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}
.time{

font-size:11px;

opacity:.7;

margin-top:5px;

}

.input-area{

display:flex;

padding:15px;

background:rgba(255,255,255,.08);

gap:10px;

}

input{

flex:1;

padding:14px;

border:none;

outline:none;

border-radius:50px;

font-size:16px;

background:white;

}

button{

width:100px;

border:none;

border-radius:50px;

background:linear-gradient(45deg,#00c853,#00e676);

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

.typing{

font-style:italic;

color:#666;

}

@keyframes show{

from{

opacity:0;
transform:translateY(15px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">

🤖 AI Assistant

<div class="online"></div>

</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Ask me anything..."
>

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>

const API_KEY="YOUR_OPENROUTER_API_KEY";

const chatBox=document.getElementById("chatBox");

const input=document.getElementById("userInput");

input.addEventListener("keypress",function(e){

if(e.key==="Enter"){

sendMessage();

}

});

function currentTime(){

const now=new Date();

return now.toLocaleTimeString([],{

hour:"2-digit",

minute:"2-digit"

});

}

function addMessage(text,type){

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML = `
<div class="text"></div>
<div class="time">${currentTime()}</div>
`;

div.querySelector(".text").textContent = text;
chatBox.appendChild(div);

chatBox.scrollTop=chatBox.scrollHeight;

}

async function sendMessage(){

const message=input.value.trim();

if(message==="") return;

addMessage(message,"user");

input.value="";

const typing=document.createElement("div");

typing.className="message bot typing";

typing.id="typing";

typing.innerHTML="AI is typing...";

chatBox.appendChild(typing);

chatBox.scrollTop=chatBox.scrollHeight;

try{

const response=await fetch(

"https://openrouter.ai/api/v1/chat/completions",

{

method:"POST",

headers:{

"Content-Type":"application/json",

Authorization:"Bearer "+API_KEY

},

body:JSON.stringify({

model:"deepseek/deepseek-chat",

messages:[

{

role:"system",

content:"You are a professional AI assistant. Give clear, helpful, and concise answers. Format responses with proper paragraphs and bullet points when appropriate."

},

{

role:"user",

content:message

}

]

})

}

);

const data=await response.json();

document.getElementById("typing").remove();

const reply=data.choices?.[0]?.message?.content || "No response.";

addMessage(reply,"bot");

}

catch(error){

document.getElementById("typing").remove();

addMessage("❌ Unable to connect with AI.","bot");

console.log(error);

}

}

addMessage("👋 Hello! I'm your AI Assistant. Ask me anything.","bot");

</script>

</body>
</html>
