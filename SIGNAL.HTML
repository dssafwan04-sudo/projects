<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Price Calculator</title>

    <style>
        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .box {
            background-color: white;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            width: 500px;
        }
        label,
        input {
            display: block;
            width: 100%;
            margin-bottom: 15px;
        }
        input {
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: rgb(88, 177, 88);
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Enter Your Coustmers</h2>
        <label for="age">Age:</label>
        <input type="number" id="age" min="1">
        <label for="time">Show Time:</label>
        <input type="time" id="time">
        <button onclick="calculatePrice()">Calculate Price</button>
        <p id="result">Ticket Price: ₹0</p>
    </div>

    <script>
        function calculatePrice() {
            let age = Number(document.getElementById("age").value);
            let time = document.getElementById("time").value;
            let resultText = document.getElementById("result");
            let price = 200;
            if (isNaN(age) || age <= 0) {
                resultText.textContent = "Please enter a valid age.";
                return;
            }
            if (age < 12) {
                price -= 5;
            }
            else if (age >= 65) {
                price -= 7;
            }
            else if (time < "12:00") {
                price -= 10; 
            }
            else {
                price -= 15;
            }
            resultText.textContent = "Ticket Price: " + price;
        }
    </script>

</body>
</html>
