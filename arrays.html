    <script>
        const movies = [
            { id: 1, title: "Bahubali", rating: 9 },
            { id: 2, title: "Pushpa", rating: 8 },
            { id: 3, title: "RRR", rating: 10 },
            { id: 4, title: "Salaar", rating: 7 }
        ];
        //1
        const titles = movies.map(movie => movie.title);
        console.log(titles);
        //2
        const rating = movies.map(movie => movie.rating);
        console.log(rating);
        //3
        const ratings = movies.map(movie => movie.rating += 1);
        console.log(ratings);
        //4
        const ratingGreater = movies.filter(movie => movie.rating > 8);
        console.log(ratingGreater);
        //5
        const ratingLesser = movies.filter(movie => movie.rating < 9);
        console.log(ratingLesser);
        //6
        const ID = movies.find(movie => movie.id === 3);
        console.log(ID);
        //7
        const titleX = movies.find(movie => movie.title === "Pushpa");
        console.log(titleX);
        //8
        const totalRatings = movies.reduce((sum, movie) => sum + movie.rating, 0);
        console.log(totalRatings);
    </script>
    <script>
         const products = [
             { id: 1, name: "Laptop", price: 50000 },
             { id: 2, name: "Mouse", price: 500 },
             { id: 3, name: "Keyboard", price: 1500 },
             { id: 4, name: "Monitor", price: 12000 }
        ];
        // 9. Create an array containing only product names.
        const productNames = products.map(product => product.name);
        console.log("Product Names:", productNames);

        // 10. Create an array containing only product prices.
        const productPrices = products.map(product => product.price);
        console.log("Product Prices:", productPrices);

        // 11. Increase every product price by ₹1000.
        const increasedPrices = products.map(product => ({
             ...product,
         price: product.price + 1000
        }));
        console.log("Prices Increased by ₹1000:", increasedPrices);

        // 12. Get all products costing more than ₹1000.
        const productsAbove1000 = products.filter(product => product.price > 1000);
        console.log("Products Costing More Than ₹1000:", productsAbove1000);

        // 13. Get all products costing less than ₹10000.
        const productsBelow10000 = products.filter(product => product.price < 10000);
        console.log("Products Costing Less Than ₹10000:", productsBelow10000);

        // 14. Find the product with ID 2.
        const productId2 = products.find(product => product.id === 2);
        console.log("Product with ID 2:", productId2);

        // 15. Find the product named "Monitor".
        const monitorProduct = products.find(product => product.name === "Monitor");
        console.log("Product Named Monitor:", monitorProduct);

        // 16. Calculate the total cost of all products.
        const totalCost = products.reduce((total, product) => total + product.price, 0);
        console.log("Total Cost of All Products:", totalCost);
    </script>
    <script>
        const scores = [45, 80, 20, 100, 60];

        // 17. Add 10 runs to every score.
        const add10Runs = scores.map(score => score + 10);
        console.log("Scores +10 Runs:", add10Runs);

        // 18. Add 5 runs to every score.
        const add5Runs = scores.map(score => score + 5);
        console.log("Scores +5 Runs:", add5Runs);

        // 19. Get all scores greater than 50.
        const scoresGreaterThan50 = scores.filter(score => score > 50);
        console.log("Scores > 50:", scoresGreaterThan50);

        // 20. Get all scores greater than or equal to 80.
        const scoresGreaterOrEqual80 = scores.filter(score => score >= 80);
        console.log("Scores >= 80:", scoresGreaterOrEqual80);

        // 21. Find the first score greater than 70.
        const firstScoreGreaterThan70 = scores.find(score => score > 70);
        console.log("First Score > 70:", firstScoreGreaterThan70);

        // 22. Find the first score equal to 100.
        const firstScore100 = scores.find(score => score === 100);
        console.log("First Score = 100:", firstScore100);

        // 23. Calculate the total runs scored.
        const totalRuns = scores.reduce((total, score) => total + score, 0);
         console.log("Total Runs:", totalRuns);

        // 24. Calculate the average score.
        const averageScore = totalRuns / scores.length;
        console.log("Average Score:", averageScore);
    </script>
    <script>
        const students = [
            { name: "Ravi", marks: 90 },
            { name: "Priya", marks: 75 },
            { name: "Rahul", marks: 40 },
            { name: "Anu", marks: 95 }
        ];

        // 25. Create an array containing only student names.
        const studentNames = students.map(student => student.name);
        console.log("Student Names:", studentNames);

        // 26. Create an array containing only student marks.
        const studentMarks = students.map(student => student.marks);
        console.log("Student Marks:", studentMarks);

        // 27. Add 5 marks to every student.
        const updatedMarks = students.map(student => ({
             ...student,
        marks: student.marks + 5
        }));
        console.log("Marks Increased by 5:", updatedMarks);

        // 28. Get students who scored above 80.
        const above80 = students.filter(student => student.marks > 80);
        console.log("Students Scored Above 80:", above80);

        // 29. Get students who scored below 50.
        const below50 = students.filter(student => student.marks < 50);
        console.log("Students Scored Below 50:", below50);

        // 30. Find the student named "Rahul".
        const rahul = students.find(student => student.name === "Rahul");
        console.log("Student Named Rahul:", rahul);

        // 31. Find the first student who scored above 90.
        const above90 = students.find(student => student.marks > 90);
        console.log("First Student Scored Above 90:", above90);

        // 32. Calculate the total marks of all students.
        const totalMarks = students.reduce((total, student) => total + student.marks, 0);
        console.log("Total Marks:", totalMarks);
    </script>
