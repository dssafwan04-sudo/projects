<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Pizza Order Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f8f4ec;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:1100px;
    background:white;
    padding:30px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    gap:40px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.left{
    flex:1;
}

.right{
    flex:1;
}

h1{
    font-size:35px;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    display:block;
    margin:15px 0 5px;
}

select{
    width:100%;
    padding:10px;
    font-size:18px;
}

.size-buttons{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.size-btn{
    padding:10px 20px;
    border:2px solid #333;
    background:white;
    cursor:pointer;
    border-radius:5px;
}

.active{
    background:#e95b2d;
    color:white;
}

.toppings{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.receipt{
    background:#fff;
    border:2px dashed #ccc;
    padding:20px;
}

.receipt h2{
    margin-bottom:20px;
}

.receipt p{
    margin:10px 0;
    display:flex;
    justify-content:space-between;
}

.total{
    font-size:35px;
    font-weight:bold;
    text-align:right;
    margin-top:20px;
}

button.order{
    margin-top:20px;
    background:green;
    color:white;
    border:none;
    padding:12px 25px;
    cursor:pointer;
    border-radius:5px;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">

    <div class="left">
        <h1>🍕 BUILD YOUR SMART PIZZA</h1>

        <label>CRUST</label>
        <select id="crust" onchange="calculateTotal()">
            <option value="8">Thin ($8)</option>
            <option value="10">Regular ($10)</option>
            <option value="12">Stuffed ($12)</option>
        </select>

        <label>SIZE</label>

        <div class="size-buttons">
            <button class="size-btn" onclick="selectSize(this,0)">Small</button>
            <button class="size-btn" onclick="selectSize(this,2)">Medium</button>
            <button class="size-btn active" onclick="selectSize(this,4)">Large</button>
        </div>

        <label>TOPPINGS</label>

        <div class="toppings">
            <label><input type="checkbox" value="1" onchange="calculateTotal()"> Cheese</label>
            <label><input type="checkbox" value="1" onchange="calculateTotal()"> Mushrooms</label>
            <label><input type="checkbox" value="1" onchange="calculateTotal()"> Peppers</label>
            <label><input type="checkbox" value="1" onchange="calculateTotal()"> Pepperoni</label>
            <label><input type="checkbox" value="1" onchange="calculateTotal()"> Chicken</label>
        </div>
    </div>

    <div class="right">

        <div class="receipt">
            <h2>🧾 YOUR RECEIPT</h2>

            <p><span>Base:</span><span id="basePrice">$12.00</span></p>
            <p><span>Toppings:</span><span id="toppingPrice">$0.00</span></p>
            <p><span>Subtotal:</span><span id="subtotal">$12.00</span></p>
            <p><span>Discount:</span><span>10%</span></p>

            <div class="total" id="finalTotal">
                $10.80
            </div>
        </div>

        <button class="order">PLACE ORDER</button>

    </div>

</div>

<script>

let sizePrice = 4;

function selectSize(button, price){

    document.querySelectorAll(".size-btn").forEach(btn=>{
        btn.classList.remove("active");
    });

    button.classList.add("active");

    sizePrice = price;

    calculateTotal();
}

function calculateTotal(){

    let crustPrice =
    Number(document.getElementById("crust").value);

    let toppingPrice = 0;

    document.querySelectorAll(
    '.toppings input[type="checkbox"]:checked'
    ).forEach(item=>{
        toppingPrice += Number(item.value);
    });

    let base = crustPrice + sizePrice;

    let subtotal = base + toppingPrice;

    let final = subtotal - (subtotal * 0.10);

    document.getElementById("basePrice").innerText =
    "$" + base.toFixed(2);

    document.getElementById("toppingPrice").innerText =
    "$" + toppingPrice.toFixed(2);

    document.getElementById("subtotal").innerText =
    "$" + subtotal.toFixed(2);

    document.getElementById("finalTotal").innerText =
    "$" + final.toFixed(2);
}

calculateTotal();

</script>

</body>
</html>
