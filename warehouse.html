<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Warehouse Management System</title>
</head>
<body>

<h2>Open Console (F12 → Console) to View the Report</h2>

<script>

// =========================================
// SMART WAREHOUSE MANAGEMENT SYSTEM
// =========================================

// Input Data
const products = [
{
    name: "  wireless mouse ",
    category: "electronics",
    quantity: 25,
    price: 799
},
{
    name: "Gaming Keyboard",
    category: "ELECTRONICS",
    quantity: 8,
    price: 2499
},
{
    name: "office chair",
    category: "furniture",
    quantity: 3,
    price: 5999
},
{
    name: "LED Monitor",
    category: "Electronics",
    quantity: 15,
    price: 10999
},
{
    name: "water bottle",
    category: "home",
    quantity: 50,
    price: 299
}
];

// Search Keyword
const keyword = "ele";

// =========================================
// DATA CLEANING
// =========================================

const cleanedProducts = products.map(product => {

    let properName = product.name
        .trim()
        .toLowerCase()
        .split(" ")
        .map(word =>
            word.charAt(0).toUpperCase() +
            word.slice(1)
        )
        .join(" ");

    let category = product.category.toUpperCase();

    let inventoryValue = product.quantity * product.price;

    let stockStatus = "";

    if (product.quantity > 20) {
        stockStatus = "HIGH STOCK";
    }
    else if (product.quantity >= 10 && product.quantity <= 20) {
        stockStatus = "MEDIUM STOCK";
    }
    else if (product.quantity >= 1 && product.quantity <= 9) {
        stockStatus = "LOW STOCK";
    }
    else {
        stockStatus = "OUT OF STOCK";
    }

    return {
        ...product,
        name: properName,
        category: category,
        inventoryValue: inventoryValue,
        stockStatus: stockStatus
    };
});

// =========================================
// PRODUCT DETAILS
// =========================================

console.log("=====================================");
console.log("SMART WAREHOUSE MANAGEMENT REPORT");
console.log("=====================================");

console.log("\nPRODUCT DETAILS");
console.log("-------------------------------------");

cleanedProducts.forEach(product => {

    console.log(`
Product Name    : ${product.name}
Category        : ${product.category}
Quantity        : ${product.quantity}
Price           : ₹${product.price}
Inventory Value : ₹${product.inventoryValue}
Stock Status    : ${product.stockStatus}
`);
});

// =========================================
// WAREHOUSE STATISTICS
// =========================================

const totalProducts = cleanedProducts.length;

const totalInventoryValue = cleanedProducts.reduce(
    (total, product) => total + product.inventoryValue,
    0
);

const averagePrice =
    cleanedProducts.reduce(
        (total, product) => total + product.price,
        0
    ) / totalProducts;

const mostExpensive = cleanedProducts.reduce(
    (max, product) =>
        product.price > max.price ? product : max
);

const cheapest = cleanedProducts.reduce(
    (min, product) =>
        product.price < min.price ? product : min
);

const highestQuantity = cleanedProducts.reduce(
    (max, product) =>
        product.quantity > max.quantity ? product : max
);

const lowestQuantity = cleanedProducts.reduce(
    (min, product) =>
        product.quantity < min.quantity ? product : min
);

console.log("\n=====================================");
console.log("WAREHOUSE STATISTICS");
console.log("=====================================");

console.log("Total Products            :", totalProducts);
console.log("Total Inventory Value     : ₹" + totalInventoryValue);
console.log("Average Product Price     : ₹" + averagePrice.toFixed(2));
console.log("Most Expensive Product    :", mostExpensive.name);
console.log("Cheapest Product          :", cheapest.name);
console.log("Highest Quantity Product  :", highestQuantity.name);
console.log("Lowest Quantity Product   :", lowestQuantity.name);

// =========================================
// SEARCH FEATURE
// =========================================

console.log("\n=====================================");
console.log("SEARCH RESULTS");
console.log("=====================================");

const searchResults = cleanedProducts.filter(product =>
    product.category
        .toLowerCase()
        .includes(keyword.toLowerCase())
);

searchResults.forEach(product => {
    console.log(
        `${product.name} - ${product.category}`
    );
});

// =========================================
// SORTING BY PRICE
// =========================================

console.log("\n=====================================");
console.log("PRICE : HIGHEST TO LOWEST");
console.log("=====================================");

const priceSorted = [...cleanedProducts].sort(
    (a, b) => b.price - a.price
);

priceSorted.forEach(product => {
    console.log(
        `${product.name} - ₹${product.price}`
    );
});

// =========================================
// SORTING BY QUANTITY
// =========================================

console.log("\n=====================================");
console.log("QUANTITY : LOWEST TO HIGHEST");
console.log("=====================================");

const quantitySorted = [...cleanedProducts].sort(
    (a, b) => a.quantity - b.quantity
);

quantitySorted.forEach(product => {
    console.log(
        `${product.name} - ${product.quantity}`
    );
});

// =========================================
// TOP 3 COSTLIEST PRODUCTS
// =========================================

console.log("\n=====================================");
console.log("TOP 3 COSTLIEST PRODUCTS");
console.log("=====================================");

const top3Products = [...cleanedProducts]
    .sort((a, b) => b.price - a.price)
    .slice(0, 3);

top3Products.forEach((product, index) => {
    console.log(
        `${index + 1}. ${product.name} - ₹${product.price}`
    );
});

// =========================================
// LOW STOCK ALERTS
// =========================================

console.log("\n=====================================");
console.log("LOW STOCK ALERTS");
console.log("=====================================");

cleanedProducts
    .filter(product => product.quantity < 5)
    .forEach(product => {
        console.log(
            `WARNING: ${product.name} stock is critically low.`
        );
    });

// =========================================
// CATEGORY SUMMARY
// =========================================

console.log("\n=====================================");
console.log("CATEGORY SUMMARY");
console.log("=====================================");

const categorySummary = {};

cleanedProducts.forEach(product => {

    if (categorySummary[product.category]) {
        categorySummary[product.category]++;
    } else {
        categorySummary[product.category] = 1;
    }

});

for (let category in categorySummary) {
    console.log(
        `${category} : ${categorySummary[category]}`
    );
}

// =========================================
// STOCK VISUALIZATION
// =========================================

console.log("\n=====================================");
console.log("STOCK VISUALIZATION");
console.log("=====================================");

cleanedProducts.forEach(product => {

    console.log(
        product.name.padEnd(20) +
        " " +
        "#".repeat(product.quantity)
    );

});

console.log("\n=====================================");
console.log("END OF REPORT");
console.log("=====================================");

</script>

</body>
</html>
